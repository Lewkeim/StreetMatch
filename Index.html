<!DOCTYPE html>
<html>
<head>
<title>StreetMatch</title>

<style>
body{
font-family:Arial;
background:#1c1c1c;
color:white;
text-align:center;
}

#game{
width:800px;
margin:auto;
}

#car{
width:420px;
border-radius:8px;
box-shadow:0 0 20px black;
cursor:grab;
}

.streets{
display:flex;
justify-content:space-around;
margin-top:30px;
}

.street{
width:170px;
padding:20px;
background:#2e8b57;
border-radius:8px;
font-weight:bold;
box-shadow:0 0 10px black;
}

.street:hover{
background:#3fa46b;
}

#result{
font-size:22px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>StreetMatch</h1>
<h3>Drag the car onto the correct street</h3>

<div id="game">

<img id="car" draggable="true" src="1950-mercury-coupe.jpg">

<div class="streets">

<div class="street" data-street="richford">Richford Terrace</div>
<div class="street" data-street="ingalls">Ingalls Ave</div>
<div class="street" data-street="baldeagle">Bald Eagle Drive</div>
<div class="street" data-street="dillave">Dillave</div>

</div>

<div id="result"></div>
<div id="score">Score: 0</div>

</div>

<script>

let cars=[
{img:"1950-mercury-coupe.jpg",street:"baldeagle"}
];

let current=0;
let score=0;

let car=document.getElementById("car");

car.addEventListener("dragstart",dragStart);

function dragStart(e){
e.dataTransfer.setData("car","drag");
}

document.querySelectorAll(".street").forEach(street=>{

street.addEventListener("dragover",e=>{
e.preventDefault();
});

street.addEventListener("drop",dropCar);

});

function dropCar(e){

let guess=e.target.dataset.street;

if(guess===cars[current].street){

document.getElementById("result").innerText="Correct!";
score++;

}else{

document.getElementById("result").innerText="Wrong street!";
}

document.getElementById("score").innerText="Score: "+score;

}

</script>

</body>
</html>
