<!DOCTYPE HTML>
<html>
<head>
<title>StreetMatch</title>

<style>
body{
font-family:Arial;
background:#1c1c1c;
color:white;
text-align:center;
}

#game{
width:800px;
margin:auto;
}

#car{
width:420px;
border-radius:8px;
box-shadow:0 0 20px black;
cursor:grab;
}

.streets{
display:flex;
justify-content:space-around;
margin-top:30px;
}

.street{
width:180px;
height:100px;
background:#333;
border:2px dashed #888;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
}
</style>
</head>

<body>

<h1>StreetMatch</h1>
<p>Drag the car to the street where it was parked</p>

<div id="game">

<img id="car" draggable="true"
src="1950-mercury-coupe.jpg">

<div class="streets">

<div class="street" ondrop="drop(event)" ondragover="allowDrop(event)">
Richford Terrace
</div>

<div class="street" ondrop="drop(event)" ondragover="allowDrop(event)">
Ingalls Ave
</div>

<div class="street" ondrop="drop(event)" ondragover="allowDrop(event)">
Bald Eagle Drive
</div>

<div class="street" ondrop="drop(event)" ondragover="allowDrop(event)">
Dillave
</div>

</div>
</div>

<script>

function allowDrop(ev){
ev.preventDefault();
}

document.getElementById("car").addEventListener("dragstart",function(ev){
ev.dataTransfer.setData("text","car");
});

function drop(ev){
ev.preventDefault();
ev.target.appendChild(document.getElementById("car"));
alert("Choice recorded!");
}

</script>

</body>
</html>
