let currentCar = 0;
let score = 0;

const carImage = document.getElementById("carImage");
const scoreDisplay = document.getElementById("score");
const progressDisplay = document.getElementById("progress");

function shuffleCars() {
    cars.sort(() => Math.random() - 0.5);
}

function loadCar() {

    if (currentCar >= cars.length) {
        gameOver();
        return;
    }

    carImage.src = cars[currentCar].image;

    progressDisplay.innerText =
        "Car " + (currentCar + 1) + " of " + cars.length;
}

function checkStreet(guess) {

    const correct = cars[currentCar].street;

    if (guess === correct) {
        score++;
        alert("Correct!");
    } else {
        alert("Wrong! Correct street was " + correct);
    }

    scoreDisplay.innerText = "Score: " + score;

    currentCar++;
    loadCar();
}

function gameOver() {

    document.body.innerHTML = `
        <h1>Game Over</h1>
        <h2>Your Score: ${score} / ${cars.length}</h2>
        <button onclick="location.reload()">Play Again</button>
    `;
}

document.querySelectorAll("#streets button").forEach(button => {

    button.addEventListener("click", () => {
        const guess = button.dataset.street;
        checkStreet(guess);
    });

});

shuffleCars();
loadCar();

</script>
