<!DOCTYPE html>
<html>

<head>
<title>Street Match</title>

<style>
body { font-family: Arial; text-align:center; }

img {
  max-width: 350px;
  width: 90%;
  border: 4px solid black;
}

.commentBox {
width: 500px;
margin: 15px auto;
padding: 15px;
border: 2px solid black;
background-color: #f4f4f4;
}

#playerComment {
width: 480px;
height: 80px;
}  
</style>

</head>

<body>

<h1>Street Match</h1>

<div id="score">Score: 0</div>
<div id="progress"></div>

<img id="carImage" src="">

<br><br>

<button data-street="Dill Ave">Dill Ave</button>
<button data-street="Hagel Ave">Hagel Ave</button>
<button data-street="Richford Terr">Richford Terr</button>
<button data-street="Ingalls Ave">Ingalls Ave</button>
<button data-street="Memory Lane">Memory Lane</button>

<div id="explanationBox" class="commentBox" style="display:none;"></div>

<div class="commentBox" id="playerBox" style="display:none;">
Player Comment:<br><br>
<textarea id="playerComment"></textarea>
</div>

<button id="nextButton" style="display:none;">Next Car</button>
  
<script>

const cars = [

{ 
image:"1910-pierce-four-motor.jpg",
street:"Ingalls Ave",
explanation:"This BMW was photographed on Hagel Avenue. It was part of a weekend car gathering in the neighborhood."
},
{
image:"1950-mercury-coupe3.jpg",
street:"Ingalls Ave",
explanation:"This BMW was photographed on Hagel Avenue. It was part of a weekend car gathering in the neighborhood."
},  
{
image:"1951-mercury-coupe3.jpg",
street:"Hagel Ave",
explanation:"A classic 1972 Dodge Challenger. This muscle car was parked along Dill Avenue during a summer show."
},
{
image:"1965-cadillac-deville3.jpg",
street:"Ingalls Ave",
explanation:"Ford Mustang spotted near Hagel Ave. The car appears to be a restored late-60s model."
},
  
{ image:"1972-dodge-challenger.jpg", 
street:"Dill Ave"},
explanation:"Ford Mustang spotted near Hagel Ave. The car appears to be a restored late-60s model."
},
  
{ image:"1972-dodge-challenger3.jpg",
street:"Dill Ave"},

{ image:"1972-plymouth-cuda3.jpg", 
street:"Richford Terr"},
  
{ image:"bmw3.jpg", 
street:"Hagel Ave"},
  
{ image:"bronco3.jpg", 
street:"Richford Terr"},
  
{ image:"bug3.jpg", 
street:"Ingalls Ave"},

{ image:"buga3.jpg", 
street:"Ingalls Ave"},
  
{ image:"cudahood3.jpg", 
street:"Ingalls Ave"},
  
{ image:"daytona3.jpg", 
street:"Memory Lane"},
  
{ image:"fiat3.jpg", 
street:"Ingalls Ave"},
  
{ image:"fiero3.jpg", 
street:"Memory Lane"},
  
{ image:"hotwheel3.jpg", 
street:"Richford Terr"},
  
{ image:"hurst3.jpg", 
street:"Ingalls Ave"},
  
{ image:"mustang3.jpg", 
street:"Hagel Ave"},

{ image:"nash3.jpg", 
street:"Ingalls Ave"},
  
{ image:"old-hemi-engine3.jpg",
street:"Memory Lane"},
  
{ image:"schwinA3.jpg",
street:"Ingalls Ave"},

{ image:"schwinn3.jpg", 
street:"Richford Terr"},
  
{ image:"Sunbeam3.jpg",
street:"Richford Terr"},

{ image:"yamaha3.jpg", 
street:"Richford Terr"},

{ image:"Interior3.jpg", 
street:"Hagel Ave"}

];

let currentCar = 0;
let score = 0;

const carImage = document.getElementById("carImage");
const scoreDisplay = document.getElementById("score");
const progressDisplay = document.getElementById("progress");

cars.sort(() => Math.random() - 0.5);

function loadCar(){

if(currentCar >= cars.length){
document.body.innerHTML =
"<h1>Game Over</h1><h2>Score "+score+" / "+cars.length+"</h2><button onclick='location.reload()'>Play Again</button>";
return;
}

carImage.src = cars[currentCar].image;

progressDisplay.innerText =
"Picture " + (currentCar+1) + " of " + cars.length;

}

function checkStreet(guess){

const correct = cars[currentCar].street;

let message;

if(guess === correct){
score++;
message = "Correct!";
}
else{
message = "Wrong. Correct street: " + correct;
}

scoreDisplay.innerText="Score: "+score;

document.getElementById("explanationBox").style.display="block";
document.getElementById("playerBox").style.display="block";
document.getElementById("nextButton").style.display="block";

document.getElementById("explanationBox").innerHTML =
"<b>"+message+"</b><br><br>"+cars[currentCar].explanation;
}

document.getElementById("nextButton").addEventListener("click",function(){

currentCar++;

document.getElementById("playerComment").value="";
document.getElementById("explanationBox").style.display="none";
document.getElementById("playerBox").style.display="none";
document.getElementById("nextButton").style.display="none";

loadCar();

});
  
  
document.querySelectorAll("button[data-street]").forEach(btn=>{
btn.addEventListener("click",()=>{
checkStreet(btn.dataset.street);

});

loadCar();

</script>

</body>
</html>
