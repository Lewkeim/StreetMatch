<!DOCTYPE html>
<html>
console.log("StreetMatch script loaded");
<head>
<title>Street Match</title>

<style>

button{
margin:5px;
padding:10px 15px;
font-size:16px;
cursor:pointer;
}

.correct{
background-color:#4CAF50;
color:white;
}

.wrong{
background-color:#d9534f;
color:white;
}
   

body{
font-family:Arial;
text-align:center;
}

img{
max-width:600px;
width:90%;
border:4px solid black;
}

.commentBox{
width:500px;
margin:15px auto;
padding:15px;
border:2px solid black;
background-color:#f4f4f4;
}

#nextButton{
display:none;
margin:30px auto;
padding:12px 30px;
font-size:18px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button{
margin:5px;
padding:10px 15px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Street Match</h1>

<div id="score">Score: 0</div>
<div id="progress"></div>

<br>

<img id="carImage" src="" alt="Car Image">

<br><br>

<button data-street="Ingalls Ave">Ingalls Ave</button>
<button data-street="Richford Terr">Richford Terr</button>
<button data-street="Dill Ave">Dill Ave</button>
<button data-street="Hagel Ave">Hagel Ave</button>
<button data-street="Memory Lane">Memory Lane</button>

<div id="explanationBox" class="commentBox" style="display:none"></div>

<div id="playerBox" class="commentBox" style="display:none">
<textarea id="playerComment" rows="3" style="width:90%" placeholder="Add a memory or comment"></textarea>
</div>

<button id="nextButton">Next</button>

<script>

/* -------------------------------
   GAME DATA
-------------------------------- */

const cars = [

{image:"wagon33.jpg",street:"Richford Terr",explanation:"The Keim's vacation wagon."},
{image:"fairlaneRed3.jpg",street:"Richford Terr",explanation:"Harry's red Fairlane 500."},                                                               
{image:"impala23.jpg",street:"Richford Terr",explanation:"The neighbor, McDonalds,  owned an Impala."},                                                                                                                                                                                               
{image:"meals33.jpg",street:"Hagel Ave",explanation:"Meals on Wheels history."},
{image:"meals43.jpg",street:"Hagel Ave",explanation:"Joseph LaPlaca history with Meals on Wheels"},
{image:"tbirdwindow3.jpg",street:"Dill Ave",explanation:"Old Tbird stored near Jim's house."},
{image:"scoter3.jpg",street:"Ingalls Ave",explanation:"Anth bought a scooter at a auction."},
{image:"bronco3.jpg",street:"Richford Terr",explanation:"Minibike Aunt Eleanor bought Lewis."},
{image:"bug3.jpg",street:"Ingalls Ave",explanation:"Anth's VW project."},  
{image:"buga3.jpg",street:"Ingalls Ave",explanation:"Anth's VW project gone bad."},
{image:"cudahood3.jpg",
street:"Ingalls Ave",
explanation:`IN order to put a fiberglass hood scope on the cuda
the original hood with factory scopes had to be replaced with a
flat hood availasble on less sporty versions of the cuda. Lew actually
saw a car on Elmore ave, followed it home and talked the owner into a trade. The hood
was placed in Anthonys driveway!!`},
{image:"daytona3.jpg",street:"Memory Lane",explanation:"The famous Daytona Superbird sighting."},
{image:"fiat3.jpg",street:"Ingalls Ave",explanation:"Anth's Italian Fiat."},
{image:"fiero3.jpg",street:"Memory Lane",explanation:"Lewis bought Maritza a Pontiac Fiero."},
{image:"lincoln23a.jpg",street:"Memory Lane",explanation:"The Holland tunnel and the Lincoln tunnel actually changed traffic directions over the ages. When coming back from NYC we sawe  sign that said Holland tunnel and followed it in leu of trying to find the Lincoln tunnel that we arrived in. THe problem was the Holland Tunnel had two lanes of traffic in different directions. Lew switched laness at the last second and headed down the tunnel in the wrong direction!!!"},
{image:"lincoln43.jpg",street:"Memory Lane",explanation:"Bus coming straight at the car."},
{image:"lincoln33.jpg",street:"Memory Lane",explanation:"Lew squeezing through center stantions.The move was to avoid a bus comiing at them."},
{image:"mustang-engine3.jpg",street:"Hagel Ave",explanation:"Whose engine was this? This isn't and impossible question."}

{image:"sunbeam3.jpg",street:"Richford Terr",explanation:"Aunt Eleanor's Sunbeam. It was white. Makes it hard to distingiuish from  Anth's Fiat."},
{image:"yamaha3.jpg",street:"Richford Terr",explanation:"Lew traded Harry for a Yamaha 350?  for a couch. When the Richford Terr house was sold."},
{image:"interior3a.jpg",street:"Hagel Ave",explanation:"Mustang interior. Pretty hard question. NOt sure this is the correct year interior picture."},
{image:"zora3.jpg",street:"Memory Lane",explanation:"The winning player gets a 2026 Corvette ZORA!!!"},
{image:"piercemotor3.jpg",street:"Ingalls Ave",explanation:"Hidden in the Grygotis garage was a piece of motorcycle history! What was the major part missing from the engine?"}
{image:"mercury50.jpg",street:"Ingalls Ave",explanation:"Hidden in the Grygotis garage was a 1950 Mercury. The front chrome is not as bold as a 1951 and the color was gray. Where is it n now?"},
{image:"mercury51.jpg",street:"Richford Terr",explanation:"The first car in Keim History - a Mercury a year different in age than Anthony's. Check the bumper see the points"},
{image:"rowboat23.jpg",street:"Richford Terr",explanation:"Well since we didn't do well n the VDM112 question, how about what was the X in the boat registration number?"},
{image:"deville3.jpg",street:"Ingalls Ave",explanation:"Anthony's rich aunt drove a Caddy- which he sold to Lewis"},
{image:"boat33.jpg",street:"Ingalls Ave",explanation:"Does anyone remember the wooden hydroplane Anthony built ?"}


];


/* VARIABLES */

let currentCar = 0;
let score = 0;
let playerComments = [];

const carImage = document.getElementById("carImage");
const scoreDisplay = document.getElementById("score");
const progressDisplay = document.getElementById("progress");


/* SHUFFLE */

cars.sort(()=>Math.random()-0.5);


/* LOAD CAR */

function loadCar(){

if(currentCar >= cars.length){

let resultsHTML="<h1>Game Over</h1>";
resultsHTML+="<h2>Score "+score+" / "+cars.length+"</h2>";

for(let i=0;i<cars.length;i++){

resultsHTML+="<div style='border:1px solid black;padding:10px;margin:10px'>";   
  
resultsHTML+="<img src='images/"+cars[i].image+"' style='max-width:200px'><br>";
      
resultsHTML+="<b>Street:</b> "+cars[i].street+"<br>";

if(cars[i].explanation)
resultsHTML+="<b>Explanation:</b> "+cars[i].explanation+"<br>";

if(playerComments[i])
resultsHTML+="<b>Your Comment:</b> "+playerComments[i];

resultsHTML+="</div>";
}

resultsHTML+="<button onclick='location.reload()'>Play Again</button>";

document.body.innerHTML=resultsHTML;
return;

}

carImage.src="images/"+cars[currentCar].image;
carImage.onerror = function(){
    this.alt="Image not found: "+cars[currentCar].image;   
};
   
progressDisplay.innerText=
"Picture "+(currentCar+1)+" of "+cars.length;
document.querySelectorAll("button[data-street]").forEach(btn=>{
    btn.disabled = false;
});
   
}


/* CHECK ANSWER */

function checkStreet(guess){

const correct=cars[currentCar].street;

let message;

if(guess===correct){
score++;
message="Correct!";
}
else{
message="Wrong. Correct street: "+correct;
}

scoreDisplay.innerText="Score: "+score;

document.getElementById("explanationBox").style.display="block";
document.getElementById("playerBox").style.display="block";
document.getElementById("nextButton").style.display="block";

document.getElementById("explanationBox").innerHTML=
"<b>"+message+"</b><br><br>"+cars[currentCar].explanation;

document.querySelectorAll("button[data-street]").forEach(btn=>{
btn.disabled=true;
});

}
/* NEXT BUTTON */

document.getElementById("nextButton").onclick=function(){

playerComments[currentCar]=
document.getElementById("playerComment").value;

currentCar++;

document.getElementById("playerComment").value="";
document.getElementById("explanationBox").style.display="none";
document.getElementById("playerBox").style.display="none";
document.getElementById("nextButton").style.display="none";

loadCar();

};


/* BUTTON EVENTS */

document.querySelectorAll("button[data-street]").forEach(btn=>{

btn.addEventListener("click",()=>{
checkStreet(btn.dataset.street);
});

});


/* START GAME */

loadCar();

</script>

</body>
</html>
