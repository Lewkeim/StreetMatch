<!DOCTYPE HTML>

<!DOCTYPE html>
<html>

<head>
<title>You Win!</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

img{
width:500px;
max-width:90%;
border:5px solid black;
margin-top:40px;
}

button{
margin-top:30px;
padding:20px 40px;
font-size:24px;
background-color:#4CAF50;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background-color:#3e8e41;
}

</style>
</head>

<body>

<h1>Street Match</h1>

<img src="winner.jpg" alt="Winner">

<br>

<button onclick="playWin()">You Are A Winner!</button>

<audio id="winSound">
<source src="images/startyour.mp3" type="audio/mpeg">
</audio>

<script>

window.onload = function(){
document.getElementById("winSound").play();
};

function playWin(){

document.getElementById("winSound").play();

setTimeout(function(){
window.location.href="index.html";
},3000);

}

</script>

</body>
</html>
