<!DOCTYPE html>
<html>

<head>
<title>You Win!</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

img{
width:500px;
max-width:90%;
border:5px solid black;
margin-top:40px;
}



button{
margin-top:30px;
padding:20px 40px;
font-size:24px;
background-color:#4CAF50;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background-color:#3e8e41;
}

</style>
</head>

<body>

<h1>Street Match</h1>

<img src="winner.jpg" alt="Winner">

<br>

<button onclick="playWin()">See your prize</button>

<!-- AUDIO -->
<audio id="winSound">
<source src="images/startyour.mp3" type="audio/mpeg">
</audio>

<!-- VIDEO (hidden at first) -->
<video id="winVideo" controls style="display:none;">
<source src="images/AnthLewJimJohn.mp4" type="video/mp4">
</video>

video{
display:block;
margin:20px auto;
max-width:50%;
width:300px;
border:5px solid black;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}


  
<script>

function playWin(){

const audio = document.getElementById("winSound");
const video = document.getElementById("winVideo");

// play audio first
audio.play();

// when audio ends → show video
audio.onended = function(){

video.style.display = "block";
video.play();

};

}

</script>

</body>
</html>
